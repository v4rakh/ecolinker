inputs:
  version:
    description: "version to use"
    required: true
    type: string
  registryFQDN:
    description: "fqdn of internal registry"
    type: string
    required: true
  registryUser:
    description: "user name for internal registry"
    type: string
    required: true
  registryPass:
    description: "password for internal registry"
    type: string
    required: true

runs:
  using: "composite"
  steps:
    - name: Login to Forgejo
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registryFQDN }}
        username: ${{ inputs.registryUser }}
        password: ${{ inputs.registryPass }}

    - name: OCI - build and push
      shell: bash
      run: |
        docker buildx build --push --no-cache -t git.myservermanager.com/varakh/ecolinker:latest -t git.myservermanager.com/varakh/ecolinker:${{ inputs.version }} -f Dockerfile .
